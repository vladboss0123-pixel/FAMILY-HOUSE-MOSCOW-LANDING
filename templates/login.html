<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #f8f6f1; --white: #fff; --charcoal: #1a1a1a; --warm-gray: #8a8580; --light-gray: #e8e5df; --accent-dark: #9e7d5a; --danger: #c0392b; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .box { background: var(--white); border: 1px solid var(--light-gray); border-radius: 4px; padding: 48px; width: 100%; max-width: 380px; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; text-align: center; margin-bottom: 32px; color: var(--charcoal); }
  .form-label { display: block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--warm-gray); margin-bottom: 8px; }
  .form-input { width: 100%; padding: 14px 16px; border: 1px solid var(--light-gray); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 15px; background: var(--cream); outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent-dark); }
  .form-group { margin-bottom: 20px; }
  .btn { width: 100%; padding: 14px; background: var(--charcoal); color: var(--white); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }
  .btn:hover { background: var(--accent-dark); }
  .error { background: #fdf0ef; border: 1px solid #f5c6c2; color: var(--danger); padding: 12px 16px; border-radius: 2px; font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">Панель управления</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Пароль</label>
      <input class="form-input" type="password" name="password" autofocus>
    </div>
    <button class="btn" type="submit">Войти</button>
  </form>
</div>
</body>
</html>
